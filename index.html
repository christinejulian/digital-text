<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Echoes of the Titanic — Silent Film Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #f5f5f5;
    font-family: "Cinzel", Georgia, serif;
    height: 100%;
    overflow: hidden;
  }

  #screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at center, #222 0%, #000 60%);
    text-align: center;
    padding: 40px;
  }

  .card {
    border: 8px double #f5f5f5;
    padding: 30px;
    background: #000;
    box-shadow: 0 0 40px rgba(0,0,0,0.9);
    max-width: 800px;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
  }

  .title {
    font-size: 32px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .text {
    font-size: 20px;
    line-height: 1.6;
  }

  .choices {
    margin-top: 25px;
    font-size: 18px;
    white-space: pre-line;
  }

  .hint {
    margin-top: 20px;
    font-size: 16px;
    opacity: 0.7;
  }

  /* film overlays */
  .film-grain {
    pointer-events: none;
    position: fixed;
    inset: 0;
    z-index: 1;
    opacity: 0.25;
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px),
      radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 3px 3px, 5px 5px;
    mix-blend-mode: screen;
    animation: grainMove 8s linear infinite;
  }

  @keyframes grainMove {
    0% { transform: translate(0,0); }
    50% { transform: translate(10px,-10px); }
    100% { transform: translate(0,0); }
  }

  .vignette {
    pointer-events: none;
    position: fixed;
    inset: 0;
    z-index: 0;
    background: radial-gradient(circle at center,
      rgba(0,0,0,0) 0%,
      rgba(0,0,0,0.4) 60%,
      rgba(0,0,0,0.9) 100%);
  }

  .sepia {
    pointer-events: none;
    position: fixed;
    inset: 0;
    z-index: 2;
    background: rgba(112, 66, 20, 0.25);
    mix-blend-mode: overlay;
  }

  .scratches {
    pointer-events: none;
    position: fixed;
    inset: 0;
    z-index: 3;
    opacity: 0.35;
    background-image:
      linear-gradient(90deg,
        transparent 0%,
        rgba(255,255,255,0.15) 2%,
        transparent 4%),
      linear-gradient(90deg,
        transparent 0%,
        rgba(255,255,255,0.08) 1%,
        transparent 3%);
    background-size: 4px 100%, 2px 100%;
    animation: scratchesMove 12s linear infinite;
  }

  @keyframes scratchesMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(-100%); }
  }
</style>
</head>

<body>

<div class="sepia"></div>
<div class="scratches"></div>
<div class="film-grain"></div>
<div class="vignette"></div>

<div id="screen">
  <div class="card" id="card">
    <div class="title" id="cardTitle"></div>
    <div class="text" id="cardText"></div>
    <div class="choices" id="cardChoices"></div>
    <div class="hint" id="cardHint"></div>
  </div>
</div>

<audio id="titanicAudio" loop>
  <source src="JulianChristine_SoundObject.mp3" type="audio/mpeg">
</audio>

<script>
  const card = document.getElementById("card");
  const cardTitle = document.getElementById("cardTitle");
  const cardText = document.getElementById("cardText");
  const cardChoices = document.getElementById("cardChoices");
  const cardHint = document.getElementById("cardHint");
  const audioEl = document.getElementById("titanicAudio");

  let courage = 0;
  let awareness = 0;
  let compassion = 0;
  let luck = 0;
  let resolve = 0;

  let step = 0;

  function fadeInCard() {
    card.style.opacity = "1";
  }

  function playAudio() {
    audioEl.play().catch(() => {});
  }

  function showCard(title, text, choices, hint) {
    cardTitle.textContent = title;
    cardText.textContent = text;
    cardChoices.textContent = choices || "";
    cardHint.textContent = hint || "";
    card.style.opacity = "0";
    setTimeout(fadeInCard, 100);
  }

  function startGame() {
    playAudio();
    step = 1;
    showCard(
      "Echoes of the Titanic",
      "A silent‑era interactive film.\nYour fate will be shaped by your choices.",
      "",
      "Press any key to begin."
    );
  }

  function nextStep() {
    if (step === 1) {
      step = 2;
      showCard(
        "First Choice",
        "A faint vibration travels through the floor.\nPassengers whisper.\nThe air feels wrong.",
        "1 — Investigate the noise (Awareness)\n2 — Head to the deck (Courage)\n3 — Check on passengers (Compassion)\n4 — Stay still and observe (Luck)\n5 — Brace yourself (Resolve)",
        "Press 1–5"
      );
    }

    else if (step === 2) {
      step = 3;
      showCard(
        "Second Choice",
        "The ship begins to list.\nCrew uncover lifeboats.\nPanic spreads.",
        "1 — Find a lifeboat (Awareness)\n2 — Help load women/children (Courage)\n3 — Comfort a child (Compassion)\n4 — Follow a crew member (Luck)\n5 — Hold your ground (Resolve)",
        "Press 1–5"
      );
    }

    else if (step === 3) {
      step = 4;
      showCard(
        "Final Choice",
        "The bow sinks lower.\nTime is running out.",
        "1 — Escape immediately (Awareness)\n2 — Stay to help (Courage)\n3 — Search for missing passengers (Compassion)\n4 — Take a risky shortcut (Luck)\n5 — Prepare for the worst (Resolve)",
        "Press 1–5"
      );
    }

    else if (step === 4) {
      step = 5;
      showEnding();
    }
  }

  function applyChoice(key) {
    const amount = step === 3 ? 3 : 2;

    if (key === "1") awareness += amount;
    if (key === "2") courage += amount;
    if (key === "3") compassion += amount;
    if (key === "4") luck += amount;
    if (key === "5") resolve += amount;

    nextStep();
  }

  function determineEnding() {
    // Awareness endings
    if (awareness >= 6) {
      const endings = [
        ["Ending A1 — The Watchful Survivor", "Your vigilance guides you to safety."],
        ["Ending A2 — The Early Escape", "You act before others realize the danger."],
        ["Ending A3 — The Navigator", "You find a hidden route to a lifeboat."]
      ];
      return endings[Math.floor(Math.random() * endings.length)];
    }

    // Courage endings
    if (courage >= 6) {
      const endings = [
        ["Ending C1 — The Hero", "You save lives as the ship sinks beneath you."],
        ["Ending C2 — The Last Stand", "You refuse to leave until the final moment."],
        ["Ending C3 — The Guardian", "Your bravery shields others from panic."]
      ];
      return endings[Math.floor(Math.random() * endings.length)];
    }

    // Compassion endings
    if (compassion >= 6) {
      const endings = [
        ["Ending P1 — The Last Lifeboat", "Your kindness earns you a place in the final boat."],
        ["Ending P2 — The Caretaker", "You stay with frightened passengers until rescue arrives."],
        ["Ending P3 — The Gentle Soul", "Your empathy shapes your fate in the icy night."]
      ];
      return endings[Math.floor(Math.random() * endings.length)];
    }

    // Luck endings
    if (luck >= 6) {
      const endings = [
        ["Ending L1 — The Coin Flip", "Chance favors you in the chaos."],
        ["Ending L2 — The Lucky Break", "A crew member pulls you aboard at the last second."],
        ["Ending L3 — The Narrow Escape", "You survive by pure fortune."]
      ];
      return endings[Math.floor(Math.random() * endings.length)];
    }

    // Resolve endings
    if (resolve >= 6) {
      const endings = [
        ["Ending R1 — The Stoic", "You face the end with unwavering calm."],
        ["Ending R2 — The Iron Will", "Your resolve carries you through impossible odds."],
        ["Ending R3 — The Survivor's Spirit", "You endure the night through sheer determination."]
      ];
      return endings[Math.floor(Math.random() * endings.length)];
    }

    // Dark endings
    const dark = [
      ["Ending D1 — Too Late", "You hesitate too long. The Atlantic claims the ship."],
      ["Ending D2 — The Echo Below", "You wander into the lower decks. Shadows move."],
      ["Ending D3 — The Silent Depths", "Your fate disappears beneath the waves."]
    ];
    return dark[Math.floor(Math.random() * dark.length)];
  }

  function showEnding() {
    const [title, text] = determineEnding();
    showCard(title, text, "", "Press R to replay.");
  }

  function resetGame() {
    courage = 0;
    awareness = 0;
    compassion = 0;
    luck = 0;
    resolve = 0;
    step = 0;
    startGame();
  }

  document.addEventListener("keydown", (e) => {
    const key = e.key;

    if (step === 0) {
      startGame();
      return;
    }

    if (step === 1) {
      nextStep();
      return;
    }

    if (["1","2","3","4","5"].includes(key) && step >= 2 && step <= 4) {
      applyChoice(key);
      return;
    }

    if (key.toLowerCase() === "r" && step === 5) {
      resetGame();
      return;
    }
  });

  showCard(
    "Echoes of the Titanic",
    "A silent‑era interactive ending game.\nPress any key to begin.",
    ""
  );
</script>

</body>
</html>
