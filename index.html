<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RMS Titanic: A Choice of Narrative Game</title>

<style>

body{
font-family:Arial,sans-serif;
background:#07131f;
color:white;
text-align:center;
padding:30px;
line-height:1.6;
}

#game{
max-width:900px;
margin:auto;
background:#102235;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px black;
}

button{
padding:15px;
margin:10px;
font-size:18px;
cursor:pointer;
width:80%;
border:none;
border-radius:10px;
}

button:hover{
background:#d4af37;
}

.fact{
background:#18324f;
padding:15px;
border-left:5px solid gold;
margin:20px;
}

.ending{
font-size:28px;
font-weight:bold;
}

</style>

</head>

<body>

<div id="game">

<h1>🚢 RMS Titanic: A Choice of Narrative</h1>

<h3>Interactive Historical Story Game</h3>

<p>

You are a 22-year-old passenger aboard the RMS Titanic during its maiden voyage in April 1912.

Your choices determine whether you survive or perish.

Every decision changes your fate.

</p>

<div id="story"></div>

<div id="choices"></div>

</div>

<script>

let story=document.getElementById("story");

let choices=document.getElementById("choices");

function startGame(){

story.innerHTML=`

<h2>April 14, 1912 - 11:35 PM</h2>

<p>

You are reading in your cabin when you suddenly feel a slight vibration.

Passengers begin whispering.

Something has happened.

</p>

<div class='fact'>

Historical Fact:

Titanic struck an iceberg at approximately 11:40 PM.

Many passengers initially believed nothing serious had happened.

</div>

`;

choices.innerHTML=`

<button onclick='investigate()'>

Investigate the disturbance.

</button>

<button onclick='stayCabin()'>

Stay inside your cabin.

</button>

`;

}

function investigate(){

story.innerHTML=`

<h2>The Hallway</h2>

<p>

Crew members rush by.

You hear:

"Everyone please put on your lifejackets."

</p>

<div class='fact'>

Historical Fact:

The Titanic only carried enough lifeboats for 1,178 people.

Over 2,200 people were aboard.

</div>

`;

choices.innerHTML=`

<button onclick='helpOthers()'>

Help elderly passengers.

</button>

<button onclick='runLifeboat()'>

Run to a lifeboat immediately.

</button>

`;

}

function stayCabin(){

story.innerHTML=`

<h2>Time Is Running Out</h2>

<p>

You remain inside.

Water begins entering lower decks.

Panic spreads.

</p>

`;

choices.innerHTML=`

<button onclick='lateEscape()'>

Try escaping now.

</button>

`;

}

function helpOthers(){

story.innerHTML=`

<h2>Helping Others</h2>

<p>

You guide children and elderly passengers toward the upper deck.

A crew member thanks you.

</p>

<div class='fact'>

Historical Fact:

"Women and children first"

was heavily enforced on many lifeboats.

</div>

`;

choices.innerHTML=`

<button onclick='lifeboat()'>

Board a lifeboat.

</button>

<button onclick='stayBehind()'>

Stay behind to continue helping.

</button>

`;

}

function runLifeboat(){

story.innerHTML=`

<h2>Upper Deck</h2>

<p>

You arrive early.

A nearly empty lifeboat is being lowered.

</p>

`;

choices.innerHTML=`

<button onclick='lifeboat()'>

Get aboard.

</button>

<button onclick='returnHelp()'>

Go back and help others.

</button>

`;

}

function lateEscape(){

story.innerHTML=`

<h2>The Deck Is Flooded</h2>

<p>

The ship is severely tilted.

Many lifeboats have already left.

</p>

<div class='fact'>

Historical Fact:

Titanic split into two sections before sinking.

It disappeared beneath the ocean at 2:20 AM.

</div>

`;

choices.innerHTML=`

<button onclick='badEnding()'>

Jump into the water.

</button>

`;

}

function lifeboat(){

story.innerHTML=`

<h2 class='ending'>

🎉 GOOD ENDING

</h2>

<p>

You survive.

Hours later, the RMS Carpathia rescues you.

You spend the rest of your life telling the story of Titanic.

</p>

<div class='fact'>

Historical Fact:

RMS Carpathia rescued approximately 705 survivors.

</div>

`;

choices.innerHTML=`

<button onclick='startGame()'>

Play Again

</button>

`;

}

function stayBehind(){

story.innerHTML=`

<h2 class='ending'>

😢 BAD ENDING

</h2>

<p>

You remain helping passengers.

Eventually there are no lifeboats left.

You perish in the freezing Atlantic Ocean.

</p>

<div class='fact'>

Historical Fact:

The water temperature was about 28°F (-2°C).

Most victims died from hypothermia.

</div>

`;

choices.innerHTML=`

<button onclick='startGame()'>

Play Again

</button>

`;

}

function returnHelp(){

story.innerHTML=`

<h2>The Final Moments</h2>

<p>

You return below deck.

The ship suddenly begins rising vertically.

Panic erupts.

</p>

`;

choices.innerHTML=`

<button onclick='worseEnding()'>

Try to climb upward.

</button>

`;

}

function badEnding(){

story.innerHTML=`

<h2 class='ending'>

😢 BAD ENDING

</h2>

<p>

You jump into the freezing ocean.

You cannot survive the cold.

</p>

`;

choices.innerHTML=`

<button onclick='startGame()'>

Play Again

</button>

`;

}

function worseEnding(){

story.innerHTML=`

<h2 class='ending'>

💀 WORSE ENDING

</h2>

<p>

You become trapped inside the sinking ship.

The lights flicker one final time.

Titanic disappears beneath the Atlantic.

</p>

<div class='fact'>

Historical Fact:

More than 1,500 people died during the disaster.

It remains one of history's deadliest peacetime maritime disasters.

</div>

`;

choices.innerHTML=`

<button onclick='startGame()'>

Play Again

</button>

`;

}

startGame();

</script>

</body>

</html>
