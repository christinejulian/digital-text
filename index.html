<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Titanic: A Choice of Narrative Game</title>

<style>

body{
font-family:Arial, sans-serif;
background:#081421;
color:white;
text-align:center;
padding:30px;
line-height:1.6;
}

#game{
max-width:800px;
margin:auto;
padding:25px;
background:#12253a;
border-radius:15px;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:10px;
}

button:hover{
opacity:0.85;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div id="game">

<h1>Titanic: Survive the Night</h1>

<p>
An interactive historical narrative based on the true events of
April 14-15, 1912.
</p>

<div id="story">

<p>
You are a passenger aboard the RMS Titanic during its maiden voyage.
The ship is considered unsinkable.
Suddenly, you feel a strange vibration.
</p>

<button onclick="scene1()">Investigate</button>

</div>

</div>

<script>

function scene1(){

document.getElementById("story").innerHTML=`

<h2>The Iceberg</h2>

<p>
Crew members rush across the deck.
You hear someone yell:

"Iceberg ahead!"

The ship has struck ice.
Passengers are confused and unsure what is happening.
</p>

<p>What do you do?</p>

<button onclick="lifeboat()">Find a lifeboat</button>

<button onclick="help()">Help other passengers</button>

`;

}

function lifeboat(){

document.getElementById("story").innerHTML=`

<h2>Lifeboat Decision</h2>

<p>

You move quickly toward a lifeboat.

The cold air grows stronger.

There are limited seats available.

</p>

<p>Choose:</p>

<button onclick="wait()">Wait your turn</button>

<button onclick="push()">Force your way aboard</button>

`;

}

function help(){

document.getElementById("story").innerHTML=`

<h2>Helping Others</h2>

<p>

You assist children and elderly passengers.

Panic spreads throughout the ship.

The crew attempts to remain organized.

</p>

<p>Choose:</p>

<button onclick="guide()">Guide families</button>

<button onclick="search()">Search lower decks</button>

`;

}

function wait(){

document.getElementById("story").innerHTML=`

<h2>Ending: Courage</h2>

<p>

You patiently wait and eventually board a lifeboat.

You survive the disaster.

Your actions remind us that bravery and calmness can save lives.

</p>

<h3>Historical Reflection</h3>

<p>

More than 1,500 people lost their lives during the sinking of the Titanic.

This game honors the passengers and crew involved.

</p>

<button onclick="restart()">Play Again</button>

`;

}

function push(){

document.getElementById("story").innerHTML=`

<h2>Ending: Chaos</h2>

<p>

Panic causes confusion.

Crew members stop you and restore order.

The event demonstrates how fear can make disasters worse.

</p>

<h3>Historical Reflection</h3>

<p>

Real people faced impossible decisions that night.

Disasters show the importance of empathy and cooperation.

</p>

<button onclick="restart()">Play Again</button>

`;

}

function guide(){

document.getElementById("story").innerHTML=`

<h2>Ending: Heroism</h2>

<p>

You guide several families safely to lifeboats.

Your actions save lives.

</p>

<h3>Historical Reflection</h3>

<p>

Many passengers and crew displayed incredible bravery during the tragedy.

</p>

<button onclick="restart()">Play Again</button>

`;

}

function search(){

document.getElementById("story").innerHTML=`

<h2>Ending: Sacrifice</h2>

<p>

You search the lower decks to help stranded passengers.

The ship fills with freezing water.

You become part of a story of sacrifice and compassion.

</p>

<h3>Historical Reflection</h3>

<p>

The Titanic disaster remains one of history's most studied tragedies.

It teaches lessons about safety, human behavior, and resilience.

</p>

<button onclick="restart()">Play Again</button>

`;

}

function restart(){

location.reload();

}

</script>

</body>
</html>
