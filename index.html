```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Titanic 1912: A Choice of Narrative</title>

<style>

body{
font-family:Arial,sans-serif;
background:#071421;
color:white;
max-width:900px;
margin:auto;
padding:30px;
line-height:1.6;
}

h1{
text-align:center;
}

#game{
background:#10253b;
padding:25px;
border-radius:10px;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:6px;
}

button:hover{
opacity:.85;
}

.choice{
display:block;
width:100%;
}

.footer{
margin-top:25px;
font-size:14px;
opacity:.8;
}

</style>

</head>

<body>

<h1>Titanic 1912: A Choice of Narrative</h1>

<div id="game">

<h2 id="title"></h2>

<p id="story"></p>

<div id="choices"></div>

</div>

<div class="footer">

<p><strong>Created by:</strong> Christine Julian</p>

<p>ATCM 4326: Multimedia Storytelling</p>

<p>This interactive story is based on the real historical tragedy of RMS Titanic and is intended for educational purposes.</p>

</div>

<script>

const scenes = {

start:{

title:"April 14, 1912",

story:"You are a passenger aboard RMS Titanic during its maiden voyage. The evening is cold and calm. Suddenly, you feel a powerful jolt. The ship has struck an iceberg.",

choices:[

{

text:"Go investigate the commotion",

next:"investigate"

},

{

text:"Remain in your cabin",

next:"cabin"

}

]

},

investigate:{

title:"Upper Deck",

story:"Crew members rush around while passengers ask questions. Some believe everything is fine, but others sense danger.",

choices:[

{

text:"Help calm passengers",

next:"help"

},

{

text:"Search for a lifeboat",

next:"lifeboat"

}

]

},

cabin:{

title:"Your Cabin",

story:"Water begins entering lower decks. You realize waiting may be dangerous.",

choices:[

{

text:"Gather warm clothing",

next:"warm"

},

{

text:"Run immediately to the deck",

next:"lifeboat"

}

]

},

help:{

title:"Helping Others",

story:"You assist frightened passengers and help direct families toward lifeboats.",

choices:[

{

text:"Continue helping",

next:"hero"

},

{

text:"Board a lifeboat",

next:"survive"

}

]

},

warm:{

title:"Preparing for the Cold",

story:"You put on extra clothing and a life jacket before leaving.",

choices:[

{

text:"Go to the lifeboats",

next:"survive"

}

]

},

lifeboat:{

title:"Lifeboat Deck",

story:"The lifeboats are filling quickly. Time is running out.",

choices:[

{

text:"Help load passengers",

next:"hero"

},

{

text:"Board an available boat",

next:"survive"

}

]

},

hero:{

title:"Acts of Courage",

story:"Your actions help save multiple lives. Although the situation is terrifying, your bravery makes a difference.",

choices:[

{

text:"Continue",

next:"endingHero"

}

]

},

survive:{

title:"Rescue",

story:"You safely board a lifeboat. Hours later, survivors are rescued from the freezing Atlantic Ocean.",

choices:[

{

text:"See Ending",

next:"endingSurvive"

}

]

},

endingHero:{

title:"Historical Reflection",

story:"Thousands of people displayed extraordinary courage during the disaster. Their actions are remembered more than a century later. The Titanic tragedy led to major improvements in maritime safety.",

choices:[

{

text:"Play Again",

next:"start"

}

]

},

endingSurvive:{

title:"Historical Reflection",

story:"More than 1,500 people lost their lives during the sinking. The tragedy changed international maritime laws and improved emergency preparedness.",

choices:[

{

text:"Play Again",

next:"start"

}

]

}

};

function showScene(sceneName){

const scene = scenes[sceneName];

document.getElementById("title").textContent = scene.title;

document.getElementById("story").textContent = scene.story;

const choices = document.getElementById("choices");

choices.innerHTML = "";

scene.choices.forEach(choice => {

const button = document.createElement("button");

button.className = "choice";

button.textContent = choice.text;

button.onclick = () => showScene(choice.next);

choices.appendChild(button);

});

}

showScene("start");

</script>

</body>

</html>
```
