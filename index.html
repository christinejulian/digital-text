<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Echoes of the Titanic — Silent Film Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #f5f5f5;
    font-family: "Cinzel", Georgia, serif;
    height: 100%;
    overflow: hidden;
  }

  #screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at center, #222 0%, #000 60%);
    text-align: center;
    padding: 40px;
  }

  .card {
    border: 8px double #f5f5f5;
    padding: 30px;
    background: #000;
    box-shadow: 0 0 40px rgba(0,0,0,0.9);
    max-width: 800px;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
  }

  .title {
    font-size: 32px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .text {
    font-size: 20px;
    line-height: 1.6;
    white-space: pre-line;
  }

  .button {
    display: block;
    margin: 12px auto;
    padding: 12px 20px;
    border: 3px solid #f5f5f5;
    background: #000;
    color: #f5f5f5;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 2px;
    width: 60%;
    cursor: pointer;
    transition: 0.3s;
  }

  .button:hover {
    background: #f5f5f5;
    color: #000;
  }

  /* film overlays */
  .film-grain {
    pointer-events: none;
    position: fixed;
    inset: 0;
    z-index: 1;
    opacity: 0.25;
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px),
      radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 3px 3px, 5px 5px;
    mix-blend-mode: screen;
    animation: grainMove 8s linear infinite;
  }

  @keyframes grainMove {
    0% { transform: translate(0,0); }
    50% { transform: translate(10px,-10px); }
    100% { transform: translate(0,0); }
  }

  .vignette {
    pointer-events: none;
    position: fixed;
    inset: 0;
    z-index: 0;
    background: radial-gradient(circle at center,
      rgba(0,0,0,0) 0%,
      rgba(0,0,0,0.4) 60%,
      rgba(0,0,0,0.9) 100%);
  }

  .sepia {
    pointer-events: none;
    position: fixed;
    inset: 0;
    z-index: 2;
    background: rgba(112, 66, 20, 0.25);
    mix-blend-mode: overlay;
  }

  .scratches {
    pointer-events: none;
    position: fixed;
    inset: 0;
    z-index: 3;
    opacity: 0.35;
    background-image:
      linear-gradient(90deg,
        transparent 0%,
        rgba(255,255,255,0.15) 2%,
        transparent 4%),
      linear-gradient(90deg,
        transparent 0%,
        rgba(255,255,255,0.08) 1%,
        transparent 3%);
    background-size: 4px 100%, 2px 100%;
    animation: scratchesMove 12s linear infinite;
  }

  @keyframes scratchesMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(-100%); }
  }
</style>
</head>

<body>

<div class="sepia"></div>
<div class="scratches"></div>
<div class="film-grain"></div>
<div class="vignette"></div>

<div id="screen">
  <div class="card" id="card">
    <div class="title" id="cardTitle"></div>
    <div class="text" id="cardText"></div>
    <div id="cardButtons"></div>
  </div>
</div>

<audio id="titanicAudio" loop>
  <source src="JulianChristine_SoundObject.mp3" type="audio/mpeg">
</audio>

<script>
  const card = document.getElementById("card");
  const cardTitle = document.getElementById("cardTitle");
  const cardText = document.getElementById("cardText");
  const cardButtons = document.getElementById("cardButtons");
  const audioEl = document.getElementById("titanicAudio");

  let courage = 0;
  let awareness = 0;
  let compassion = 0;
  let luck = 0;
  let resolve = 0;

  let step = 0;

  function fadeInCard() {
    card.style.opacity = "1";
  }

  function playAudio() {
    audioEl.play().catch(() => {});
  }

  function showCard(title, text, buttons = []) {
    cardTitle.textContent = title;
    cardText.textContent = text;
    cardButtons.innerHTML = "";

    buttons.forEach(btn => {
      const b = document.createElement("button");
      b.className = "button";
      b.textContent = btn.label;
      b.onclick = btn.action;
      cardButtons.appendChild(b);
    });

    card.style.opacity = "0";
    setTimeout(fadeInCard, 100);
  }

  /* MAIN MENU */
  function mainMenu() {
    showCard(
      "Echoes of the Titanic",
      "A silent‑era interactive film.\nYour fate will be shaped by your choices.",
      [
        { label: "Start Game", action: startGame },
        { label: "About", action: showAbout },
        { label: "Quit", action: quitGame }
      ]
    );
  }

  function showAbout() {
    showCard(
      "About",
      "Created in silent‑film style.\nMultiple endings.\nYour choices determine your fate.",
      [{ label: "Back", action: mainMenu }]
    );
  }

  function quitGame() {
    showCard(
      "Goodbye",
      "Thank you for playing.",
      [{ label: "Return to Menu", action: mainMenu }]
    );
  }

  /* GAME START */
  function startGame() {
    playAudio();
    step = 1;
    showCard(
      "First Choice",
      "A faint vibration travels through the floor.\nPassengers whisper.\nThe air feels wrong.",
      [
        { label: "Investigate the noise", action: () => choose("awareness", 2) },
        { label: "Head to the deck", action: () => choose("courage", 2) },
        { label: "Check on passengers", action: () => choose("compassion", 2) },
        { label: "Stay still and observe", action: () => choose("luck", 2) },
        { label: "Brace yourself", action: () => choose("resolve", 2) }
      ]
    );
  }

  function secondChoice() {
    step = 2;
    showCard(
      "Second Choice",
      "The ship begins to list.\nCrew uncover lifeboats.\nPanic spreads.",
      [
        { label: "Find a lifeboat", action: () => choose("awareness", 2) },
        { label: "Help load women/children", action: () => choose("courage", 2) },
        { label: "Comfort a child", action: () => choose("compassion", 2) },
        { label: "Follow a crew member", action: () => choose("luck", 2) },
        { label: "Hold your ground", action: () => choose("resolve", 2) }
      ]
    );
  }

  function finalChoice() {
    step = 3;
    showCard(
      "Final Choice",
      "The bow sinks lower.\nTime is running out.",
      [
        { label: "Escape immediately", action: () => choose("awareness", 3) },
        { label: "Stay to help", action: () => choose("courage", 3) },
        { label: "Search for missing passengers", action: () => choose("compassion", 3) },
        { label: "Take a risky shortcut", action: () => choose("luck", 3) },
        { label: "Prepare for the worst", action: () => choose("resolve", 3) }
      ]
    );
  }

  function choose(stat, amount) {
    if (stat === "awareness") awareness += amount;
    if (stat === "courage") courage += amount;
    if (stat === "compassion") compassion += amount;
    if (stat === "luck") luck += amount;
    if (stat === "resolve") resolve += amount;

    if (step === 1) secondChoice();
    else if (step === 2) finalChoice();
    else if (step === 3) showEnding();
  }

  /* ENDINGS */
  function determineEnding() {
    const endings = {
      awareness: [
        ["Ending A1 — The Watchful Survivor", "Your vigilance guides you to safety."],
        ["Ending A2 — The Early Escape", "You act before others realize the danger."],
        ["Ending A3 — The Navigator", "You find a hidden route to a lifeboat."]
      ],
      courage: [
        ["Ending C1 — The Hero", "You save lives as the ship sinks beneath you."],
        ["Ending C2 — The Last Stand", "You refuse to leave until the final moment."],
        ["Ending C3 — The Guardian", "Your bravery shields others from panic."]
      ],
      compassion: [
        ["Ending P1 — The Last Lifeboat", "Your kindness earns you a place in the final boat."],
        ["Ending P2 — The Caretaker", "You stay with frightened passengers until rescue arrives."],
        ["Ending P3 — The Gentle Soul", "Your empathy shapes your fate in the icy night."]
      ],
      luck: [
        ["Ending L1 — The Coin Flip", "Chance favors you in the chaos."],
        ["Ending L2 — The Lucky Break", "A crew member pulls you aboard at the last second."],
        ["Ending L3 — The Narrow Escape", "You survive by pure fortune."]
      ],
      resolve: [
        ["Ending R1 — The Stoic", "You face the end with unwavering calm."],
        ["Ending R2 — The Iron Will", "Your resolve carries you through impossible odds."],
        ["Ending R3 — The Survivor's Spirit", "You endure the night through sheer determination."]
      ],
      dark: [
        ["Ending D1 — Too Late", "You hesitate too long. The Atlantic claims the ship."],
        ["Ending D2 — The Echo Below", "You wander into the lower decks. Shadows move."],
        ["Ending D3 — The Silent Depths", "Your fate disappears beneath the waves."]
      ]
    };

    if (awareness >= 6) return endings.awareness[Math.floor(Math.random() * 3)];
    if (courage >= 6) return endings.courage[Math.floor(Math.random() * 3)];
    if (compassion >= 6) return endings.compassion[Math.floor(Math.random() * 3)];
    if (luck >= 6) return endings.luck[Math.floor(Math.random() * 3)];
    if (resolve >= 6) return endings.resolve[Math.floor(Math.random() * 3)];

    return endings.dark[Math.floor(Math.random() * 3)];
  }

  function showEnding() {
    const [title, text] = determineEnding();
    showCard(
      title,
      text,
      [{ label: "Replay", action: resetGame }]
    );
  }

  function resetGame() {
    courage = 0;
    awareness = 0;
    compassion = 0;
    luck = 0;
    resolve = 0;
    step = 0;
    mainMenu();
  }

  /* START */
  mainMenu();
</script>

</body>
</html>
