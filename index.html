<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Titanic: Night of Survival</title>

<style>

body{
font-family:Arial,sans-serif;
background:#06111d;
color:white;
padding:30px;
text-align:center;
line-height:1.7;
}

#game{

max-width:900px;

margin:auto;

padding:30px;

background:#13263d;

border-radius:15px;

}

button{

padding:12px 20px;

margin:8px;

font-size:16px;

cursor:pointer;

border:none;

border-radius:10px;

}

button:hover{

opacity:0.85;

}

h1{
color:#9fd8ff;
}

</style>

</head>

<body>

<div id="game">

<h1>Titanic: Night of Survival</h1>

<h3>Interactive Historical Narrative</h3>

<div id="story">

<p>

April 14, 1912.

11:40 PM.

You are a passenger aboard the RMS Titanic during its maiden voyage.

The ship suddenly shakes.

Passengers look around in confusion.

Something is wrong.

</p>

<button onclick="deck()">Go to the deck</button>

<button onclick="stay()">Stay inside</button>

</div>

</div>

<script>

function deck(){

story.innerHTML=`

<h2>Upper Deck</h2>

<p>

Crew members are rushing everywhere.

You hear:

"Everyone put on life jackets!"

What do you do?

</p>

<button onclick="family()">Look for your family</button>

<button onclick="crew()">Ask a crew member</button>

`;

}

function stay(){

story.innerHTML=`

<h2>Inside the Ship</h2>

<p>

Many people believe nothing serious has happened.

The lights still work.

Some continue talking and laughing.

</p>

<button onclick="investigate()">Investigate noises</button>

<button onclick="returnDeck()">Go upstairs</button>

`;

}

function family(){

story.innerHTML=`

<h2>Searching for Family</h2>

<p>

You search crowded hallways.

Children are crying.

People are confused.

</p>

<button onclick="foundFamily()">You find them</button>

<button onclick="lostFamily()">You cannot find them</button>

`;

}

function crew(){

story.innerHTML=`

<h2>Talking To Crew</h2>

<p>

A crew member says:

"Head to the lifeboats immediately."

</p>

<button onclick="lifeboat()">Go now</button>

<button onclick="helpCrew()">Help organize passengers</button>

`;

}

function investigate(){

story.innerHTML=`

<h2>Lower Decks</h2>

<p>

You discover freezing water entering hallways.

Panic begins spreading.

</p>

<button onclick="warn()">Warn everyone</button>

<button onclick="escape()">Run upstairs</button>

`;

}

function returnDeck(){

deck();

}

function foundFamily(){

story.innerHTML=`

<h2>Together Again</h2>

<p>

You locate your family.

You have very little time.

</p>

<button onclick="lifeboat()">Head to lifeboats</button>

<button onclick="guideOthers()">Guide others too</button>

`;

}

function lostFamily(){

story.innerHTML=`

<h2>Difficult Decision</h2>

<p>

Time is running out.

Do you continue searching?

</p>

<button onclick="continueSearch()">Continue searching</button>

<button onclick="lifeboat()">Go to lifeboats</button>

`;

}

function helpCrew(){

story.innerHTML=`

<h2>Helping Crew</h2>

<p>

You calm frightened passengers.

Your actions save valuable time.

</p>

<button onclick="lifeboat()">Go to lifeboats</button>

`;

}

function warn(){

story.innerHTML=`

<h2>Warning Others</h2>

<p>

People finally realize the danger.

Some listen.

Others refuse to believe you.

</p>

<button onclick="escape()">Run upstairs</button>

`;

}

function escape(){

story.innerHTML=`

<h2>Racing Against Time</h2>

<p>

Water rises quickly.

You barely reach the upper deck.

</p>

<button onclick="lifeboat()">Find a lifeboat</button>

`;

}

function guideOthers(){

story.innerHTML=`

<h2>Heroic Actions</h2>

<p>

You help elderly passengers and children.

People begin following you.

</p>

<button onclick="heroEnding()">Continue helping</button>

`;

}

function continueSearch(){

story.innerHTML=`

<h2>Last Search</h2>

<p>

You hear your family's voices.

You reunite moments before evacuation.

</p>

<button onclick="lifeboat()">Go together</button>

`;

}

function lifeboat(){

story.innerHTML=`

<h2>The Lifeboats</h2>

<p>

There are very few seats left.

What do you do?

</p>

<button onclick="waitTurn()">Wait your turn</button>

<button onclick="sacrifice()">Give up your seat</button>

<button onclick="panic()">Push through the crowd</button>

`;

}

function waitTurn(){

story.innerHTML=`

<h2>Ending 1: Survivor</h2>

<p>

You remain calm.

Eventually, you board a lifeboat.

You survive.

</p>

<h3>Lesson:</h3>

<p>

Staying calm can save lives.

</p>

<button onclick="restart()">Play Again</button>

`;

}

function sacrifice(){

story.innerHTML=`

<h2>Ending 2: Selfless Hero</h2>

<p>

You give your seat to another passenger.

Your actions save a life.

</p>

<h3>Lesson:</h3>

<p>

Many people displayed extraordinary bravery that night.

</p>

<button onclick="restart()">Play Again</button>

`;

}

function panic(){

story.innerHTML=`

<h2>Ending 3: Chaos</h2>

<p>

Panic spreads.

The crew regains control.

Valuable time is lost.

</p>

<h3>Lesson:</h3>

<p>

Fear can worsen emergencies.

</p>

<button onclick="restart()">Play Again</button>

`;

}

function heroEnding(){

story.innerHTML=`

<h2>Ending 4: Hero of the Titanic</h2>

<p>

You help many passengers reach safety.

Several families survive because of your actions.

</p>

<button onclick="restart()">Play Again</button>

`;

}

function restart(){

location.reload();

}

</script>

</body>

</html>
